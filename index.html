                                    <div class="flex flex-col gap-1">
                                        <span class="text-[10px] font-bold text-pink-500 uppercase tracking-widest">${questions[i].title.match(/「(.*?)」/)[1]}</span>
                                        <p class="text-base font-bold text-neutral-800">${ans.split(': ')[1]}</p>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="mt-12 pt-8 border-t border-neutral-100 flex flex-col items-center gap-4">
                                <div class="text-[10px] text-neutral-400 font-mono">VERIFIED BY PANTS SYSTEM V2.0</div>
                                <div class="flex gap-1">${Array(7).fill('<div class="w-1.5 h-1.5 rounded-full bg-pink-200"></div>').join('')}</div>
                            </div>
                        </div>
                        <div class="flex flex-col gap-3 mt-8">
                            <button onclick="copyResult()" class="w-full py-5 bg-neutral-900 text-white rounded-3xl font-bold flex items-center justify-center gap-2 hover:bg-neutral-800 active:scale-95 transition-all">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>
                                鑑定書をシェアする
                            </button>
                            <button onclick="resetApp()" class="w-full py-5 bg-white border border-neutral-200 text-neutral-400 rounded-3xl font-bold flex items-center justify-center gap-2 hover:bg-neutral-50 active:scale-95 transition-all">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                もう一度やり直す
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        function startQuiz() {
            state.step = 'quiz';
            render();
        }

        function handleSelect(idx) {
            state.answers.push(questions[state.currentQ].options[idx]);
            if (state.currentQ < questions.length - 1) {
                state.currentQ++;
                render();
                window.scrollTo(0, 0);
            } else {
                state.step = 'result';
                render();
            }
        }

        function resetApp() {
            state = { step: 'intro', currentQ: 0, answers: [] };
            render();
        }

        function copyResult() {
            const title = `${state.answers[0].split(': ')[1]}なる${state.answers[6].split(': ')[1]}`;
            const summary = state.answers.map((a, i) => `Q${i+1}: ${a.split(': ')[1]}`).join('\n');
            const text = `【唯一無二のパンツ鑑定書】\n称号：${title}\n\n${summary}\n#パンツ診断 #唯一無二`;
            
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            // Simple visual feedback
            const btn = document.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'コピーしました！';
            setTimeout(() => { btn.innerHTML = originalText; }, 2000);
        }

        // Initial render
        window.onload = render;
    </script>
</body>
</html>
